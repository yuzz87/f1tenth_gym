# 幅7 m、高さ5 m、走路幅1 mの楕円形コース用設定
# 地図とwaypointは experiments/tools/create_oval_map.py で生成する。

run_name: homur_oval

# パスはリポジトリ直下からの相対パスで指定する。
map_path: experiments/maps/homur_oval
map_ext: .png
wpt_path: experiments/maps/homur_oval_waypoints.csv

# 初期姿勢 [x, y, theta]
# 楕円中心線の右端から、反時計回りに走り始める。
sx: 3.0
sy: 0.0
stheta: 1.57079632679

# waypoint CSVの読み込み設定
wpt_delim: ";"
wpt_rowskip: 3
wpt_xind: 1
wpt_yind: 2
wpt_thind: 3
wpt_vind: 5

# シミュレーション設定
num_agents: 1
timestep: 0.01
integrator: RK4
lidar_dist: 0.0

# 描画設定
# 7 m x 5 mの小さなコースを大きく表示するため、余白を小さくする。
render:
  window_width: 800
  window_height: 600
  camera_margin: 200
  score_font_size: 18
  fps_font_size: 14
  show_fps: true
  obstacle_point_size: 2.5
  obstacle_color: [112, 120, 132]

# Pure Pursuit制御器の設定
controller:
  tlad: 0.8
  vgain: 1.0

# 機体パラメータ
car_params:
  mu: 1.0489
  C_Sf: 4.718
  C_Sr: 5.4562
  lf: 0.15875
  lr: 0.17145
  h: 0.074
  m: 3.74
  I: 0.04712
  s_min: -0.4189
  s_max: 0.4189
  sv_min: -3.2
  sv_max: 3.2
  v_switch: 7.319
  a_max: 9.51
  v_min: -5.0
  v_max: 20.0
  width: 0.31
  length: 0.58
