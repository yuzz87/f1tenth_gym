run_name: homur_oval_localized_mppi_v3_0_tuned
controller_type: mppi

map_path: experiments/maps/homur_oval
map_ext: .png
wpt_path: experiments/maps/homur_oval_waypoints.csv

sx: 3.0
sy: 0.0
stheta: 1.57079632679

wpt_delim: ";"
wpt_rowskip: 3
wpt_xind: 1
wpt_yind: 2
wpt_thind: 3
wpt_vind: 5

num_agents: 1
timestep: 0.01
integrator: RK4
lidar_dist: 0.0

render:
  window_width: 800
  window_height: 600
  camera_margin: 200
  score_font_size: 18
  fps_font_size: 14
  show_fps: true
  obstacle_point_size: 2.5
  obstacle_color: [112, 120, 132]

controller:
  horizon: 14
  num_samples: 256
  target_speed: 3.0
  temperature: 0.35
  noise_sigma: 0.05
  position_weight: 4.0
  heading_weight: 0.8
  terminal_position_weight: 10.0
  terminal_heading_weight: 2.0
  control_weight: 0.02
  delta_weight: 1.1
  nominal_weight: 1.8
  tlad: 0.8
  vgain: 3.0
  seed: 7

localizer:
  type: map_localizer
  scan_beams: 180
  xy_search_radius: 0.04
  theta_search_radius: 0.08
  xy_candidates: 5
  theta_candidates: 7
  score_penalty: 0.3
  motion_prior_weight: 2.0
  heading_prior_weight: 0.6
  scan_noise_std: 0.0
  initialization_noise: [0.0, 0.0, 0.0]

car_params:
  mu: 1.0489
  C_Sf: 4.718
  C_Sr: 5.4562
  lf: 0.15875
  lr: 0.17145
  h: 0.074
  m: 3.74
  I: 0.04712
  s_min: -0.4189
  s_max: 0.4189
  sv_min: -3.2
  sv_max: 3.2
  v_switch: 7.319
  a_max: 9.51
  v_min: -5.0
  v_max: 20.0
  width: 0.31
  length: 0.58
